<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    body {
      background: #232629;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: grid;
      grid-template-columns: 320px 1fr 1fr 50px;
      grid-template-rows: 414px 1fr 50px 1fr;
      gap: 9px;
      background: #232629;
      width: 748px;
      height: 748px;
      box-sizing: border-box;
      padding: 9px;
    }

    .white1 {
      background: #F0F1EC;
      grid-column: 1 / 2;
      grid-row: 1 / 3;
    }

    .red {
      background: #E72F24;
      grid-column: 2 / 3;
      grid-row: 1 / 2;
    }

    .white2 {
      background: #F0F1EC;
      grid-column: 3 / 5;
      grid-row: 1 / 2;
    }

    .white3 {
      background: #F0F1EC;
      grid-column: 1 / 2;
      grid-row: 3 / 5;
    }

    .white4 {
      background: #F0F1EC;
      grid-column: 2 / 4;
      grid-row: 2 / 4;
    }

    .blue {
      background: #004592;
      grid-column: 4 / 5;
      grid-row: 2 / 3;
      border-bottom: 10px solid #232629;
    }

    .yellow {
      background: #F9D01E;
      grid-column: 2 / 3;
      grid-row: 4 / 5;
    }

    .black {
      background: #232629;
      grid-column: 3 / 4;
      grid-row: 4 / 5;
    }

    .white5 {
      background: #F0F1EC;
      grid-column: 4 / 5;
      grid-row: 3 / 5;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="white1"></div>
    <div class="red"></div>
    <div class="white2"></div>
    <div class="white3"></div>
    <div class="white4"></div>
    <div class="blue"></div>
    <div class="yellow"></div>
    <div class="black"></div>
    <div class="white5"></div>
  </div>
</body>

</html>
