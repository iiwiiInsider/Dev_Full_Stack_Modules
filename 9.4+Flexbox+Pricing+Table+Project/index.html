<!DOCTYPE html>
<html>
  <head>
    <title>Flexbox Pricing Table</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Sono", sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        /* Space theme background */
        background: radial-gradient(ellipse at top left, #232946 60%, #0f1021 100%);
        background-image: url('https://images.unsplash.com/photo-1465101046530-73398c7f28ca?auto=format&fit=crop&w=1500&q=80');
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        color: #eaeaea;
      }

      .pricing-container {
        display: flex;
        gap: 32px;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
        width: 100%;
        margin-top: 40px;
        margin-bottom: 40px;
        box-sizing: border-box;
      }

      .pricing-plan {
        background: rgba(30, 34, 54, 0.7); /* transparent matte */
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.18);
        flex: 1 1 300px;
        min-width: 260px;
        max-width: 350px;
        padding: 32px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: transform 0.2s, box-shadow 0.2s;
        backdrop-filter: blur(2px);
        border: 1px solid rgba(255,255,255,0.08);
      }

      .pricing-plan:hover {
        transform: translateY(-8px) scale(1.03);
        box-shadow: 0 8px 32px rgba(0,0,0,0.32);
      }

      .plan-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 12px;
        color: #eaeaea;
        letter-spacing: 1px;
        text-shadow: 0 2px 8px #232946;
      }

      .plan-price {
        font-size: 2.2rem;
        font-weight: 700;
        margin-bottom: 18px;
        color: #a5d7ff;
        text-shadow: 0 2px 8px #232946;
      }

      .plan-features {
        list-style: none;
        padding: 0;
        margin: 0 0 24px 0;
        width: 100%;
      }

      .plan-features li {
        font-size: 1.1rem;
        margin-bottom: 10px;
        text-align: left;
        color: #eaeaea;
        text-shadow: 0 1px 4px #232946;
      }

      .plan-button {
        background: rgba(165, 215, 255, 0.18); /* transparent matte */
        color: #eaeaea;
        border: 1px solid #a5d7ff;
        border-radius: 8px;
        padding: 12px 32px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s, border 0.2s;
        backdrop-filter: blur(1px);
        box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      }

      .plan-button:hover {
        background: rgba(165, 215, 255, 0.35);
        border: 1px solid #fff;
        color: #fff;
      }

      @media (max-width: 900px) {
        .pricing-container {
          gap: 20px;
          margin-top: 30px;
          margin-bottom: 30px;
        }
        .pricing-plan {
          padding: 24px 12px;
        }
      }

      @media (max-width: 650px) {
        .pricing-container {
          flex-direction: column;
          align-items: stretch;
          gap: 24px;
          margin-top: 20px;
          margin-bottom: 20px;
        }
        .pricing-plan {
          max-width: 100%;
          min-width: 0;
        }
      }
    </style>
  </head>

  <body>
    <div class="pricing-container">
      <div class="pricing-plan">
        <div class="plan-title">Basic</div>
        <div class="plan-price">$9.99/month</div>
        <ul class="plan-features">
          <li>✅ 10GB Storage</li>
          <li>✅ 1 User</li>
          <li>🚫 Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
      <div class="pricing-plan">
        <div class="plan-title">Standard</div>
        <div class="plan-price">$19.99/month</div>
        <ul class="plan-features">
          <li>✅ 50GB Storage</li>
          <li>✅ 5 Users</li>
          <li>✅ Phone &amp; Email Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
      <div class="pricing-plan">
        <div class="plan-title">Premium</div>
        <div class="plan-price">$49.99/month</div>
        <ul class="plan-features">
          <li>✅ 100GB Storage</li>
          <li>✅ 10 Users</li>
          <li>✅ 24/7 Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
    </div>
  </body>
</html>
