<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Property Listing PDF Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary:#0A6EB4; --bg:#f5f7fa; --card:#fff; --border:#d9e2ec; --radius:12px; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: 'Inter', system-ui, Arial, sans-serif; background:var(--bg); color:#1f2933; }
    header { padding:1.5rem 2rem; background:linear-gradient(90deg,var(--primary),#094a7a); color:#fff; }
    header h1 { margin:0; font-size:1.5rem; letter-spacing:.5px; }
    main { max-width:1150px; margin:1.5rem auto 3rem; padding:0 1.5rem; }
    .grid { display:grid; gap:1.25rem; grid-template-columns: repeat(auto-fit,minmax(320px,1fr)); }
    form { display:grid; gap:1.5rem; }
    fieldset { border:1px solid var(--border); padding:1.25rem 1.25rem 1rem; border-radius:var(--radius); background:var(--card); box-shadow:0 2px 4px rgba(0,0,0,.04); }
    legend { padding:0 .5rem; font-weight:600; color:var(--primary); }
    label { display:flex; flex-direction:column; font-size:.75rem; font-weight:500; text-transform:uppercase; letter-spacing:.5px; gap:.35rem; color:#52606d; }
    input, textarea, select { width:100%; padding:.65rem .75rem; border:1px solid var(--border); border-radius:8px; font:inherit; background:#fff; resize:vertical; }
    input:focus, textarea:focus, select:focus { outline:2px solid var(--primary); border-color:var(--primary); }
    .two-col { display:grid; gap:.75rem; grid-template-columns: repeat(auto-fit,minmax(140px,1fr)); }
    .actions { display:flex; gap:1rem; flex-wrap:wrap; justify-content:flex-end; }
    button { background:var(--primary); color:#fff; padding:.9rem 1.4rem; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; box-shadow:0 4px 12px -2px rgba(10,110,180,.4); transition:.25s; }
    button:hover { transform:translateY(-1px); box-shadow:0 6px 16px -3px rgba(10,110,180,.5); }
    button:active { transform:translateY(0); }
    .status { font-size:.85rem; color:#52606d; }
    footer { text-align:center; padding:2rem 1rem 3rem; font-size:.75rem; color:#829ab1; }
    .feature-tags { display:flex; flex-wrap:wrap; gap:.5rem; margin-top:.5rem; }
    .feature-tags span { background:#e0f2fe; color:#0369a1; padding:.4rem .6rem; border-radius:20px; font-size:.65rem; font-weight:600; cursor:pointer; }
  </style>
</head>
<body>
  <header>
    <h1>Property Listing PDF Generator</h1>
  </header>
  <main>
    <form id="listingForm">
      <div class="grid">
        <fieldset>
          <legend>Property</legend>
          <label>Address<input name="property.address" required placeholder="123 Main St, City" /></label>
          <div class="two-col">
            <label>Type<input name="property.type" required placeholder="House / Condo" /></label>
            <label>Year Built<input name="property.yearBuilt" type="number" min="0" /></label>
          </div>
          <div class="two-col">
            <label>Bedrooms<input name="property.bedrooms" type="number" min="0" /></label>
            <label>Bathrooms<input name="property.bathrooms" type="number" min="0" /></label>
          </div>
          <div class="two-col">
            <label>Land Size (m²)<input name="property.landSize" type="number" min="0" /></label>
            <label>Building Size (m²)<input name="property.buildingSize" type="number" min="0" /></label>
          </div>
          <div class="two-col">
            <label>Asking Price (ZAR)<input name="property.askingPrice" required type="number" min="0" step="0.01" placeholder="350000" /></label>
            <label>HOA Fees<input name="property.hoaFees" type="number" min="0" step="0.01" /></label>
          </div>
          <label>Parking<input name="property.parking" placeholder="2 car garage / Street" /></label>
          <label>Description<textarea name="property.description" rows="4" placeholder="Marketing description highlighting the best aspects..."></textarea></label>
        </fieldset>

        <fieldset>
          <legend>Images</legend>
          <label>Hero Image (main)
            <input type="file" id="heroImage" accept="image/*" />
          </label>
          <label>Gallery Images (up to 12)
            <input type="file" id="galleryImages" accept="image/*" multiple />
          </label>
          <div id="imagePreview" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:.5rem;"></div>
          <small style="color:#52606d;font-size:.65rem;">Images are embedded into the PDF (resized). Large images are compressed by the browser when converted.</small>
        </fieldset>

        <fieldset>
          <legend>Features</legend>
          <label>Add Feature
            <div style="display:flex; gap:.5rem;">
              <input id="featureInput" placeholder="e.g. Renovated Kitchen" />
              <button type="button" id="addFeature" style="flex:0 0 auto;">Add</button>
            </div>
          </label>
          <div id="featureTags" class="feature-tags"></div>
          <input type="hidden" name="features" id="featuresField" />
        </fieldset>

        <fieldset>
          <legend>Neighborhood</legend>
          <label>Schools<textarea name="neighborhood.schools" rows="2"></textarea></label>
            <label>Transport<textarea name="neighborhood.transport" rows="2"></textarea></label>
            <label>Amenities<textarea name="neighborhood.amenities" rows="2"></textarea></label>
            <label>Parks<textarea name="neighborhood.parks" rows="2"></textarea></label>
            <label>Overview<textarea name="neighborhood.description" rows="3" placeholder="General vibe, lifestyle, proximity to attractions..."></textarea></label>
        </fieldset>

        <fieldset>
          <legend>Agent</legend>
          <label>Name<input name="agent.name" required /></label>
          <label>License #<input name="agent.license" /></label>
          <div class="two-col">
            <label>Email<input name="agent.email" type="email" /></label>
            <label>Phone<input name="agent.phone" type="tel" /></label>
          </div>
        </fieldset>

        <fieldset>
          <legend>Agency</legend>
          <label>Name<input name="agency.name" required /></label>
          <label>Registration #<input name="agency.registration" /></label>
          <label>Tagline<input name="agency.tagline" placeholder="Professional Real Estate Services" /></label>
          <label>Address<textarea name="agency.address" rows="3"></textarea></label>
        </fieldset>

        <fieldset>
          <legend>Extras</legend>
          <label>Disclaimer<textarea name="disclaimer" rows="3" placeholder="Custom disclaimer text..."></textarea></label>
        </fieldset>
      </div>
      <div class="actions">
        <span id="status" class="status"></span>
        <button type="submit">Generate Listing PDF</button>
      </div>
    </form>
    <footer>
      <div>Listing PDFs are marketing materials only and not a substitute for legally required disclosures.</div>
    </footer>
  </main>
  <script>
    const featureInput = document.getElementById('featureInput');
    const addFeatureBtn = document.getElementById('addFeature');
    const featureTags = document.getElementById('featureTags');
    const featuresField = document.getElementById('featuresField');
    const features = [];

    function renderFeatures(){
      featureTags.innerHTML='';
      features.forEach((f,i)=>{
        const span = document.createElement('span');
        span.textContent = f + ' ✕';
        span.title = 'Remove';
        span.onclick = () => { features.splice(i,1); updateField(); renderFeatures(); };
        featureTags.appendChild(span);
      });
    }
    function updateField(){
      featuresField.value = JSON.stringify(features);
    }
    addFeatureBtn.addEventListener('click',()=>{
      const v = featureInput.value.trim();
      if(!v) return;
      features.push(v); featureInput.value=''; updateField(); renderFeatures();
    });

    const heroInput = document.getElementById('heroImage');
    const galleryInput = document.getElementById('galleryImages');
    const imagePreview = document.getElementById('imagePreview');

    let heroDataUrl = null;
    let galleryDataUrls = [];

    async function fileToDataUrl(file, maxWidth = 1600) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
            img.onload = () => {
              // Resize via canvas to constrain width (basic compression)
              const scale = Math.min(1, maxWidth / img.width);
              const canvas = document.createElement('canvas');
              canvas.width = img.width * scale;
              canvas.height = img.height * scale;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              resolve(canvas.toDataURL('image/jpeg', 0.82));
            };
            img.onerror = reject;
            img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    heroInput?.addEventListener('change', async () => {
      const f = heroInput.files[0];
      if (!f) { heroDataUrl = null; return; }
      heroDataUrl = await fileToDataUrl(f);
      renderImagePreview();
    });
    galleryInput?.addEventListener('change', async () => {
      const files = Array.from(galleryInput.files).slice(0,12);
      galleryDataUrls = await Promise.all(files.map(f => fileToDataUrl(f)));
      renderImagePreview();
    });

    function renderImagePreview(){
      imagePreview.innerHTML='';
      if (heroDataUrl) {
        const img = document.createElement('img');
        img.src = heroDataUrl; img.style.width='90px'; img.style.border='2px solid var(--primary)'; img.title='Hero';
        imagePreview.appendChild(img);
      }
      galleryDataUrls.forEach(u => { const img=document.createElement('img'); img.src=u; img.style.width='70px'; img.style.opacity='.9'; imagePreview.appendChild(img); });
    }

    const form = document.getElementById('listingForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const statusEl = document.getElementById('status');
      statusEl.textContent = 'Generating PDF...';
      const formData = new FormData(form);
      const data = {};
      for (const [k,v] of formData.entries()) {
        if (!v) continue;
        if (k === 'features') continue; // handle after
        const path = k.split('.');
        let cursor = data;
        path.forEach((p,i)=>{
          if (i === path.length-1) { cursor[p] = v; } else { cursor[p] = cursor[p] || {}; cursor = cursor[p]; }
        });
      }
      if (features.length) data.features = [...features];
      if (heroDataUrl) data.images = { hero: heroDataUrl, gallery: galleryDataUrls };
      try {
        const res = await fetch('/api/listing', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)});
        if (!res.ok) throw new Error('Server error');
        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'listing.pdf';
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
        statusEl.textContent = 'PDF downloaded.';
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Failed to generate. Check required fields.';
      }
    });
  </script>
</body>
</html>
